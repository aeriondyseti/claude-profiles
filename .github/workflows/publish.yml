name: Publish to npm

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (dev or latest)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - latest

permissions:
  id-token: write   # Required for OIDC trusted publishing
  contents: write   # Required to create releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine npm tag
        id: npm-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            TAG="dev"
          else
            echo "::error::Unexpected ref ${{ github.ref }}"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing with npm tag: $TAG"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Set dev version
        if: steps.npm-tag.outputs.tag == 'dev'
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DEV_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"
          npm version "$DEV_VERSION" --no-git-tag-version
          echo "Set version to $DEV_VERSION"

      - name: Check if version already published
        id: check-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aeriondyseti/claude-profiles@$VERSION" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not yet published"
          fi

      - name: Publish to npm
        if: steps.check-version.outputs.skip != 'true'
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Create GitHub Release
        if: steps.npm-tag.outputs.tag == 'latest' && steps.check-version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Release $VERSION" \
            --verify-tag

  reset-dev:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reset dev branch to main
        run: git push origin main:dev --force
